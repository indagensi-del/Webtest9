<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBM — Gereja Bethel Malaysia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B2A4A;
      --navy-dark: #16223D;
      --gold: #B8893D;
      --gold-dark: #9a6f2c;
      --blue: #2E5E8C;
      --bg-cream: #FCFBF8;
      --bg-warm: #F6F1E7;
      --bg-hero: #FBF3E2;
      --bg-light: #F0F5F2;
      --text-body: #4a566f;
      --text-sub: #7a8398;
      --border: #ECE6D8;
      --border-light: #efe9da;
    }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'Mulish', sans-serif;
      color: var(--navy);
      background: var(--bg-cream);
      overflow-x: hidden;
    }

    ::placeholder { color: #9aa3b2; }

    /* ── Scroll reveal ── */
    [data-reveal] {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s cubic-bezier(.2,.7,.2,1), transform 0.7s cubic-bezier(.2,.7,.2,1);
    }
    [data-reveal].revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Animations ── */
    @keyframes gbmPulse {
      0%   { box-shadow: 0 0 0 0 rgba(37,211,102,.5); }
      70%  { box-shadow: 0 0 0 14px rgba(37,211,102,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
    }
    @keyframes gbmFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-7px); }
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 50;
      background: rgba(252,251,248,.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      height: 72px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav-logo-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--gold), var(--gold-dark));
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(184,137,61,.3);
      flex-shrink: 0;
    }
    .nav-logo-text { display: flex; flex-direction: column; line-height: 1; }
    .nav-logo-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 19px;
      color: var(--navy);
      letter-spacing: .02em;
    }
    .nav-logo-sub {
      font-size: 9.5px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #8a93a3;
      margin-top: 3px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.6vw, 26px);
      flex-wrap: wrap;
      justify-content: center;
      flex: 1;
    }
    .nav-links a {
      text-decoration: none;
      color: #37425c;
      font-weight: 600;
      font-size: 14px;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--gold); }
    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 3px;
      background: #F1ECE0;
      border: 1px solid #E7E0D0;
      border-radius: 999px;
      padding: 4px;
      flex-shrink: 0;
    }
    .lang-btn {
      padding: 6px 12px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-family: 'Mulish', sans-serif;
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items: center; gap: 5px;
      transition: all .2s ease;
      background: transparent;
      color: #6b7488;
    }
    .lang-btn.active {
      background: var(--navy);
      color: #F4E3BC;
    }

    /* ── Mobile nav: hamburger toggle, drawer, overlay ── */
    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 42px; height: 42px;
      padding: 0 9px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      flex-shrink: 0;
    }
    .nav-toggle span {
      display: block;
      height: 2px;
      width: 100%;
      background: var(--navy);
      border-radius: 2px;
      transition: transform .3s ease, opacity .2s ease;
    }
    body.nav-open .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    body.nav-open .nav-toggle span:nth-child(2) { opacity: 0; }
    body.nav-open .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 65;
      background: rgba(22,34,61,.42);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    body.nav-open .nav-overlay { opacity: 1; pointer-events: auto; }

    .nav-drawer {
      position: fixed;
      top: 0; right: 0;
      z-index: 70;
      height: 100%;
      width: min(82vw, 320px);
      background: var(--bg-cream);
      box-shadow: -14px 0 40px rgba(22,34,61,.18);
      transform: translateX(100%);
      transition: transform .3s ease;
      display: flex;
      flex-direction: column;
      padding: 86px 28px 32px;
      gap: 4px;
      overflow-y: auto;
    }
    body.nav-open .nav-drawer { transform: translateX(0); }
    .drawer-close {
      position: absolute;
      top: 18px; right: 20px;
      width: 40px; height: 40px;
      border: none;
      background: transparent;
      font-size: 32px;
      line-height: 1;
      color: var(--navy);
      cursor: pointer;
    }
    .drawer-links {
      display: flex;
      flex-direction: column;
    }
    .drawer-links a {
      text-decoration: none;
      color: #37425c;
      font-weight: 600;
      font-size: 17px;
      padding: 14px 4px;
      border-bottom: 1px solid var(--border);
      transition: color .2s;
    }
    .drawer-links a:hover { color: var(--gold); }
    .drawer-lang {
      margin-top: 26px;
      align-self: flex-start;
    }

    /* ── Hero ── */
    #home {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(165deg, #FBF3E2 0%, #FCFBF8 42%, #F0F5F2 100%);
      padding: 120px 24px 80px;
      scroll-margin-top: 72px;
    }
    .hero-orb-1 {
      position: absolute;
      top: -120px; right: -120px;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184,137,61,.14), transparent 70%);
      pointer-events: none;
    }
    .hero-orb-2 {
      position: absolute;
      bottom: -140px; left: -100px;
      width: 460px; height: 460px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(46,94,140,.10), transparent 70%);
      pointer-events: none;
    }
    .hero-content {
      position: relative;
      text-align: center;
      max-width: 840px;
    }
    .hero-eyebrow {
      text-transform: uppercase;
      letter-spacing: .22em;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 18px;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(52px, 11vw, 118px);
      line-height: .95;
      color: var(--navy);
      letter-spacing: -.01em;
    }
    .hero-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(20px, 3.2vw, 32px);
      color: var(--blue);
      margin-top: 10px;
      font-weight: 500;
    }
    .hero-tagline {
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.65;
      color: #4a566f;
      max-width: 620px;
      margin: 26px auto 0;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-top: 38px;
      padding: 16px 38px;
      background: var(--gold);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: .02em;
      box-shadow: 0 14px 30px rgba(184,137,61,.32);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .hero-cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 38px rgba(184,137,61,.4);
    }
    .hero-scroll {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: gbmFloat 2.6s ease-in-out infinite;
    }
    .hero-scroll span:first-child {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #a0a8b5;
    }
    .hero-scroll-line {
      width: 1px;
      height: 34px;
      background: linear-gradient(#c9b07e, transparent);
    }

    /* ── Section shared ── */
    section { scroll-margin-top: 72px; }
    .section-eyebrow {
      text-transform: uppercase;
      letter-spacing: .2em;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 14px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(30px, 4.4vw, 46px);
      line-height: 1.08;
      color: var(--navy);
      margin-bottom: 16px;
    }
    .section-subtitle {
      font-size: clamp(15px, 1.6vw, 17px);
      line-height: 1.7;
      color: var(--text-body);
    }
    .section-header-centered {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 52px;
    }

    /* ── About ── */
    #about {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-cream);
    }
    .about-inner { max-width: 1160px; margin: 0 auto; }
    .about-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: clamp(36px, 5vw, 72px);
      align-items: center;
    }
    .about-text p {
      font-size: clamp(15px, 1.6vw, 17px);
      line-height: 1.78;
      color: var(--text-body);
      margin-bottom: 18px;
    }
    .about-blockquote {
      margin: 8px 0 0;
      padding: 18px 24px;
      border-left: 3px solid var(--gold);
      background: #FBF6EC;
      border-radius: 0 12px 12px 0;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(17px, 2vw, 20px);
      color: var(--blue);
      line-height: 1.5;
    }
    .about-photo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pastor-photo {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 4/5;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(27,42,74,.16);
      background: repeating-linear-gradient(45deg, #efe7d6, #efe7d6 11px, #e7ddc8 11px, #e7ddc8 22px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pastor-photo span {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 12px;
      color: #9b8e6f;
      background: rgba(252,251,248,.85);
      padding: 7px 13px;
      border-radius: 8px;
      letter-spacing: .04em;
    }
    .pastor-photo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 28%;
      display: block;
    }
    .pastor-info { text-align: center; margin-top: 20px; }
    .pastor-name {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 23px;
      color: var(--navy);
    }
    .pastor-title {
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      margin-top: 7px;
    }
    .vm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
      margin-top: clamp(48px, 6vw, 80px);
    }
    .vm-card {
      border-radius: 20px;
      padding: clamp(28px, 3.5vw, 42px);
      border: 1px solid;
    }
    .vm-card.vision {
      background: #EAF1F8;
      border-color: #d8e5f1;
    }
    .vm-card.mission {
      background: #FBF3DF;
      border-color: #f0e3c2;
    }
    .vm-card-header {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 16px;
    }
    .vm-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 20px;
      flex-shrink: 0;
    }
    .vm-icon.vision-icon { background: var(--blue); }
    .vm-icon.mission-icon { background: var(--gold); }
    .vm-card h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 26px;
      color: var(--navy);
    }
    .vm-card p {
      font-size: clamp(16px, 1.8vw, 19px);
      line-height: 1.6;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    .vm-card.vision p { color: #3c4a63; }
    .vm-card.mission p { color: #5a4a2c; }

    /* ── Services ── */
    #services {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-warm);
    }
    .services-inner { max-width: 1160px; margin: 0 auto; }
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 26px;
    }
    .event-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(27,42,74,.08);
      border: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .event-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 22px 48px rgba(27,42,74,.13);
    }
    .event-photo {
      aspect-ratio: 16/10;
      background: repeating-linear-gradient(45deg, #eee7d6, #eee7d6 11px, #e6dcc7 11px, #e6dcc7 22px);
      display: flex; align-items: center; justify-content: center;
    }
    .event-photo span {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 11.5px;
      color: #9b8e6f;
      background: rgba(255,255,255,.82);
      padding: 6px 12px;
      border-radius: 7px;
      letter-spacing: .04em;
    }
    .event-body {
      padding: 22px 24px 26px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .event-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 11px;
    }
    .event-date {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .event-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #cdbf9f;
    }
    .event-time {
      font-size: 12px;
      font-weight: 600;
      color: #7a8398;
    }
    .event-card h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 22px;
      color: var(--navy);
      margin-bottom: 9px;
    }
    .event-card p {
      font-size: 14.5px;
      line-height: 1.6;
      color: #5b667d;
    }
    .see-all-wrap { text-align: center; margin-top: 48px; }
    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 15px 36px;
      background: transparent;
      color: var(--navy);
      text-decoration: none;
      border: 1.5px solid var(--navy);
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      transition: all .25s ease;
    }
    .btn-outline:hover { background: var(--navy); color: #fff; }

    /* ── Weekly Activities ── */
    #weekly {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-cream);
    }
    .weekly-inner { max-width: 1000px; margin: 0 auto; }
    .activities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }
    .activity-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 22px 24px;
      box-shadow: 0 10px 28px rgba(27,42,74,.06);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .activity-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(27,42,74,.11);
    }
    .activity-icon {
      width: 48px; height: 48px;
      flex-shrink: 0;
      border-radius: 14px;
      background: #FBF3DF;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold);
      font-size: 22px;
    }
    .activity-name {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 19px;
      color: var(--navy);
      margin-bottom: 5px;
      line-height: 1.25;
    }
    .activity-day {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* ── Pray ── */
    #pray {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: linear-gradient(180deg, #F0F5F2 0%, #FBF4E6 100%);
    }
    .pray-inner {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }
    .pray-inner .section-title { margin-bottom: 18px; }
    .pray-encourage {
      font-size: clamp(15px, 1.7vw, 18px);
      line-height: 1.7;
      color: var(--text-body);
      margin-bottom: 38px;
    }
    .pray-form, .contact-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: left;
    }
    .form-input, .form-textarea {
      width: 100%;
      padding: 15px 18px;
      border: 1px solid #E1D9C6;
      border-radius: 13px;
      background: #fff;
      font-family: 'Mulish', sans-serif;
      font-size: 15px;
      color: var(--navy);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      resize: vertical;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,137,61,.12);
    }
    .btn-primary {
      padding: 15px 32px;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Mulish', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(184,137,61,.28);
      transition: transform .25s ease;
      margin-top: 6px;
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .pray-success, .contact-success {
      background: #fff;
      border: 1px solid #ece4d2;
      border-radius: 18px;
      padding: 42px 28px;
      box-shadow: 0 14px 34px rgba(27,42,74,.08);
      text-align: center;
      display: none;
    }
    .pray-success.visible, .contact-success.visible { display: block; }
    .success-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      font-size: 26px;
    }
    .success-icon.pray-icon { background: #EAF1F8; color: var(--blue); }
    .success-icon.contact-icon { background: #FBF3DF; color: var(--gold); }
    .success-msg {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 20px;
      color: var(--navy);
    }

    /* ── Locations ── */
    #location {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-cream);
    }
    .location-inner { max-width: 1160px; margin: 0 auto; }
    .branches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
    }
    .branch-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 14px 38px rgba(27,42,74,.09);
      border: 1px solid var(--border-light);
    }
    .branch-card iframe {
      width: 100%;
      height: 240px;
      border: 0;
      display: block;
    }
    .branch-body { padding: 26px 28px 30px; }
    .branch-card h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 24px;
      color: var(--navy);
      margin-bottom: 14px;
    }
    .branch-detail {
      display: flex;
      gap: 10px;
      font-size: 15px;
      color: var(--text-body);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .branch-detail .icon { color: var(--gold); flex-shrink: 0; }
    .branch-directions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 12px 26px;
      background: var(--navy);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      transition: background .25s ease;
    }
    .branch-directions:hover { background: var(--gold); }

    /* ── Contact ── */
    #contact {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-warm);
    }
    .contact-inner { max-width: 1080px; margin: 0 auto; }
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: clamp(36px, 5vw, 64px);
      align-items: start;
    }
    .contact-info .section-title { margin-bottom: 18px; }
    .contact-info .section-subtitle { margin-bottom: 30px; }
    .contact-details { display: flex; flex-direction: column; gap: 18px; margin-bottom: 30px; }
    .contact-label {
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 11px;
      font-weight: 700;
      color: #9aa3b2;
      margin-bottom: 4px;
    }
    .contact-value {
      font-size: 17px;
      color: var(--navy);
      text-decoration: none;
      font-weight: 600;
    }
    .contact-value:hover { color: var(--gold); }
    .contact-value .sub {
      font-weight: 500;
      color: var(--text-sub);
      font-size: 14px;
    }
    .socials-label {
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 11px;
      font-weight: 700;
      color: #9aa3b2;
      margin-bottom: 12px;
    }
    .socials {
      display: flex;
      gap: 12px;
    }
    .social-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #e7e0d0;
      display: flex; align-items: center; justify-content: center;
      color: var(--navy);
      text-decoration: none;
      transition: all .25s ease;
    }
    .social-btn:hover {
      background: var(--navy);
      color: #fff;
      transform: translateY(-2px);
    }
    .contact-form-wrap {
      background: #fff;
      border: 1px solid #ece4d2;
      border-radius: 20px;
      padding: clamp(26px, 3.5vw, 38px);
      box-shadow: 0 14px 38px rgba(27,42,74,.08);
    }
    .contact-form .form-input,
    .contact-form .form-textarea {
      background: #FCFBF8;
      border-radius: 12px;
      padding: 14px 16px;
    }
    .contact-form .btn-submit {
      padding: 15px 32px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Mulish', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: background .25s ease;
      width: 100%;
    }
    .contact-form .btn-submit:hover { background: var(--gold); }

    /* ── Footer ── */
    footer {
      background: var(--navy-dark);
      color: #aeb8cf;
      padding: 54px 24px 40px;
    }
    .footer-inner {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: center;
      justify-content: space-between;
    }
    .footer-brand { display: flex; align-items: center; gap: 12px; }
    .footer-logo {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--gold), var(--gold-dark));
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 19px;
    }
    .footer-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 18px;
      color: #fff;
    }
    .footer-tagline { font-size: 12px; margin-top: 2px; color: #8b97b3; }
    .footer-rights { font-size: 13px; color: #7c89a8; }

    /* ── WhatsApp Float ── */
    .wa-float {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 11px;
      background: #fff;
      border-radius: 999px;
      padding: 9px 18px 9px 9px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      border: 1px solid #ece6d8;
      transition: transform .25s ease;
    }
    .wa-float:hover { transform: translateY(-3px); }
    .wa-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #25D366;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      animation: gbmPulse 2.2s infinite;
    }
    .wa-label {
      font-weight: 700;
      font-size: 14px;
      color: var(--navy);
      white-space: nowrap;
    }

    /* ── Church Family banner ── */
    #family {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-cream);
    }
    .family-inner { max-width: 1100px; margin: 0 auto; }
    .family-photo {
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(27,42,74,.16);
      border: 1px solid var(--border-light);
    }
    .family-photo img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .nav-links { display: none; }
      nav .lang-switcher { display: none; }
      .nav-toggle { display: flex; }
      .nav-overlay { display: block; }
    }
    @media (max-width: 640px) {
      .about-grid { grid-template-columns: 1fr; }
      .contact-grid { grid-template-columns: 1fr; }
      /* Services & Events → horizontal swipe carousel on phone */
      .events-grid {
        display: flex;
        grid-template-columns: none;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        gap: 16px;
        padding-bottom: 8px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .events-grid::-webkit-scrollbar { display: none; }
      .event-card {
        flex: 0 0 82%;
        scroll-snap-align: start;
      }
    }
    @media (max-width: 480px) {
      .wa-label { display: none; }
      .wa-float { padding: 9px; }
    }
  </style>
</head>

    // ── State ──
    let currentLang = 'en';

    // ── Helpers ──
    function get(obj, path) {
      return path.split('.').reduce((o, k) => (o == null ? undefined : o[k]), obj);
    }

    // ── Render dynamic event cards ──
    function renderEvents(lang) {
      const events = T[lang].services.events;
      const grid = document.getElementById('events-grid');
      grid.innerHTML = '';
      events.forEach((ev, i) => {
        const card = document.createElement('div');
        card.className = 'event-card';
        card.setAttribute('data-reveal', '');
        if (i > 0) card.style.transitionDelay = (i * 0.07) + 's';
        card.innerHTML = `
          <div class="event-photo"><span>event photo</span></div>
          <div class="event-body">
            <div class="event-meta">
              <span class="event-date">${ev.date}</span>
              <span class="event-dot"></span>
              <span class="event-time">${ev.time}</span>
            </div>
            <h3>${ev.name}</h3>
            <p>${ev.desc}</p>
          </div>`;
        grid.appendChild(card);
      });
    }

    // ── Render weekly activity cards ──
    function renderActivities(lang) {
      const items = T[lang].weekly.items;
      const grid = document.getElementById('activities-grid');
      grid.innerHTML = '';
      items.forEach((act, i) => {
        const card = document.createElement('div');
        card.className = 'activity-card';
        card.setAttribute('data-reveal', '');
        if (i > 0) card.style.transitionDelay = (i * 0.08) + 's';
        card.innerHTML = `
          <span class="activity-icon">✦</span>
          <div>
            <p class="activity-name">${act.name}</p>
            <p class="activity-day">${act.day}</p>
          </div>`;
        grid.appendChild(card);
      });
    }

    // ── Apply translations ──
    function applyLang(lang) {
      const t = T[lang];
      // data-i18n text
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = get(t, key);
        if (val != null) el.textContent = val;
      });
      // data-i18n-ph placeholders
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const key = el.getAttribute('data-i18n-ph');
        const val = get(t, key);
        if (val != null) el.placeholder = val;
      });
      // re-render dynamic cards
      renderEvents(lang);
      renderActivities(lang);
      // re-observe new cards
      observeRevealElements();
    }

    // ── Language switcher ──
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.getAttribute('data-lang');
        if (lang === currentLang) return;
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.lang-btn[data-lang="' + lang + '"]').forEach(b => b.classList.add('active'));
        applyLang(lang);
        closeDrawer();
      });
    });

    // ── Mobile drawer ──
    const navToggle = document.querySelector('.nav-toggle');
    const drawer = document.getElementById('mobile-drawer');
    const overlay = document.querySelector('.nav-overlay');
    function openDrawer() {
      document.body.classList.add('nav-open');
      navToggle.setAttribute('aria-expanded', 'true');
      drawer.setAttribute('aria-hidden', 'false');
    }
    function closeDrawer() {
      document.body.classList.remove('nav-open');
      navToggle.setAttribute('aria-expanded', 'false');
      drawer.setAttribute('aria-hidden', 'true');
    }
    navToggle.addEventListener('click', () => {
      document.body.classList.contains('nav-open') ? closeDrawer() : openDrawer();
    });
    overlay.addEventListener('click', closeDrawer);
    document.querySelector('.drawer-close').addEventListener('click', closeDrawer);
    document.querySelectorAll('.drawer-links a').forEach(a => a.addEventListener('click', closeDrawer));
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.body.classList.contains('nav-open')) closeDrawer();
    });

    // ── Scroll reveal ──
    let revealObserver = null;
    function observeRevealElements() {
      const els = document.querySelectorAll('[data-reveal]:not(.revealed)');
      if ('IntersectionObserver' in window) {
        if (!revealObserver) {
          revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('revealed');
                revealObserver.unobserve(entry.target);
              }
            });
          }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
        }
        els.forEach(el => revealObserver.observe(el));
      } else {
        els.forEach(el => el.classList.add('revealed'));
      }
    }

    // ── Prayer form ──
    document.getElementById('pray-form').addEventListener('submit', function(e) {
      e.preventDefault();
      this.style.display = 'none';
      document.getElementById('pray-success').classList.add('visible');
    });

    // ── Contact form ──
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      this.style.display = 'none';
      document.getElementById('contact-success').classList.add('visible');
    });

    // ── Init ──
    applyLang('en');
    observeRevealElements();
  </script>
