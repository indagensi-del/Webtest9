<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STT Anugrah Indonesia (STTAI) — GBM</title>
  <script>(function(){try{var t=localStorage.getItem('gbm-theme');if(t!=='light'&&t!=='dark'){t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B2A4A;
      --navy-dark: #16223D;
      --gold: #B8893D;
      --gold-dark: #9a6f2c;
      --blue: #2E5E8C;
      --bg-cream: #FCFBF8;
      --bg-warm: #F6F1E7;
      --bg-hero: #FBF3E2;
      --bg-light: #F0F5F2;
      --text-body: #4a566f;
      --text-sub: #7a8398;
      --border: #ECE6D8;
      --border-light: #efe9da;
      /* semantic theme roles (light) */
      --surface: #ffffff;
      --surface-2: #FCFBF8;
      --surface-blue: #EAF1F8;
      --surface-blue-bd: #d8e5f1;
      --surface-gold: #FBF3DF;
      --surface-gold-bd: #f0e3c2;
      --text-strong: #1B2A4A;
      --text-faint: #9aa3b2;
      --nav-link: var(--nav-link);
      --border-input: #E1D9C6;
      --btn-solid-bg: #1B2A4A;
      --chip-bg: #F1ECE0;
      --chip-bd: #E7E0D0;
      --chip-text: #6b7488;
      --chip-active-bg: #1B2A4A;
      --chip-active-text: #F4E3BC;
      --nav-bg: rgba(252,251,248,.88);
      --footer-bg: #16223D;
      --stripe-a: #efe7d6;
      --stripe-b: #e7ddc8;
      --vision-ink: #3c4a63;
      --mission-ink: #5a4a2c;
      --quote-bg: #FBF6EC;
      --quote-ink: #2E5E8C;
      --hero-grad: linear-gradient(165deg, #FBF3E2 0%, #FCFBF8 42%, #F0F5F2 100%);
      --pray-grad: linear-gradient(180deg, #F0F5F2 0%, #FBF4E6 100%);
    }
    html[data-theme="dark"] {
      --navy: #1B2A4A;
      --navy-dark: #0B1120;
      --bg-cream: #0F1626;
      --bg-warm: #15203A;
      --bg-hero: #14213B;
      --bg-light: #0E1A1C;
      --text-body: #BFC8DA;
      --text-sub: #93A0BD;
      --border: #2A3551;
      --border-light: #2A3551;
      --surface: #1A2540;
      --surface-2: #141E36;
      --surface-blue: #15233A;
      --surface-blue-bd: #284162;
      --surface-gold: #2A2417;
      --surface-gold-bd: #4b4226;
      --text-strong: #F1ECDF;
      --text-faint: #7C89A8;
      --nav-link: #C6CEDD;
      --border-input: #34405E;
      --btn-solid-bg: #B8893D;
      --chip-bg: #1B2638;
      --chip-bd: #2A3551;
      --chip-text: #97A2BB;
      --chip-active-bg: #B8893D;
      --chip-active-text: #15203A;
      --nav-bg: rgba(14,21,38,.85);
      --footer-bg: #0B1120;
      --stripe-a: #222D45;
      --stripe-b: #1B2538;
      --vision-ink: #CDD6E6;
      --mission-ink: #E7D6AD;
      --quote-bg: #1B2742;
      --quote-ink: #9DBEE0;
      --blue: #6FA0CE;
      --hero-grad: linear-gradient(165deg, #14213B 0%, #0F1626 45%, #0E1A1C 100%);
      --pray-grad: linear-gradient(180deg, #0E1A1C 0%, #1A1B12 100%);
    }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      transition: background-color .3s ease, color .3s ease;
      font-family: 'Mulish', sans-serif;
      color: var(--text-strong);
      background: var(--bg-cream);
      overflow-x: hidden;
    }

    ::placeholder { color: var(--text-faint); }

    /* ── Scroll reveal ── */
    [data-reveal] {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s cubic-bezier(.2,.7,.2,1), transform 0.7s cubic-bezier(.2,.7,.2,1);
    }
    [data-reveal].revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Animations ── */
    @keyframes gbmPulse {
      0%   { box-shadow: 0 0 0 0 rgba(37,211,102,.5); }
      70%  { box-shadow: 0 0 0 14px rgba(37,211,102,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
    }
    @keyframes gbmFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-7px); }
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 50;
      background: var(--nav-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      height: 72px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav-logo-icon {
      height: 48px;
      width: auto;
      display: block;
      object-fit: contain;
      flex-shrink: 0;
    }
    .nav-logo-text { display: flex; flex-direction: column; line-height: 1; }
    .nav-logo-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 19px;
      color: var(--text-strong);
      letter-spacing: .02em;
    }
    .nav-logo-sub {
      font-size: 9.5px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-top: 3px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.6vw, 26px);
      flex-wrap: wrap;
      justify-content: center;
      flex: 1;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--nav-link);
      font-weight: 600;
      font-size: 14px;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--gold); }
    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 3px;
      background: var(--chip-bg);
      border: 1px solid var(--chip-bd);
      border-radius: 999px;
      padding: 4px;
      flex-shrink: 0;
    }
    .lang-btn {
      padding: 6px 12px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-family: 'Mulish', sans-serif;
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items: center; gap: 5px;
      transition: all .2s ease;
      background: transparent;
      color: var(--chip-text);
    }
    .lang-btn.active {
      background: var(--chip-active-bg);
      color: var(--chip-active-text);
    }
    .theme-toggle {
      width: 40px; height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text-strong);
      cursor: pointer;
      transition: color .25s ease, border-color .25s ease, background .25s ease;
    }
    .theme-toggle:hover { color: var(--gold); border-color: var(--gold); }
    .theme-toggle svg { width: 19px; height: 19px; display: block; }
    .theme-toggle .icon-sun { display: none; }
    html[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
    html[data-theme="dark"] .theme-toggle .icon-sun { display: block; }

    /* ── Mobile nav: hamburger toggle, drawer, overlay ── */
    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 42px; height: 42px;
      padding: 0 9px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      cursor: pointer;
      flex-shrink: 0;
    }
    .nav-toggle span {
      display: block;
      height: 2px;
      width: 100%;
      background: var(--text-strong);
      border-radius: 2px;
      transition: transform .3s ease, opacity .2s ease;
    }
    body.nav-open .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    body.nav-open .nav-toggle span:nth-child(2) { opacity: 0; }
    body.nav-open .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 65;
      background: rgba(22,34,61,.42);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    body.nav-open .nav-overlay { opacity: 1; pointer-events: auto; }

    .nav-drawer {
      position: fixed;
      top: 0; right: 0;
      z-index: 70;
      height: 100%;
      width: min(82vw, 320px);
      background: var(--bg-cream);
      box-shadow: -14px 0 40px rgba(22,34,61,.18);
      transform: translateX(100%);
      transition: transform .3s ease;
      display: flex;
      flex-direction: column;
      padding: 86px 28px 32px;
      gap: 4px;
      overflow-y: auto;
    }
    body.nav-open .nav-drawer { transform: translateX(0); }
    .drawer-close {
      position: absolute;
      top: 18px; right: 20px;
      width: 40px; height: 40px;
      border: none;
      background: transparent;
      font-size: 32px;
      line-height: 1;
      color: var(--text-strong);
      cursor: pointer;
    }
    .drawer-links {
      display: flex;
      flex-direction: column;
    }
    .drawer-links a {
      text-decoration: none;
      color: var(--nav-link);
      font-weight: 600;
      font-size: 17px;
      padding: 14px 4px;
      border-bottom: 1px solid var(--border);
      transition: color .2s;
    }
    .drawer-links a:hover { color: var(--gold); }
    .drawer-lang {
      margin-top: 26px;
      align-self: flex-start;
    }

    /* ── Hero ── */
    #home {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--hero-grad);
      padding: 120px 24px 80px;
      scroll-margin-top: 72px;
    }
    .hero-orb-1 {
      position: absolute;
      top: -120px; right: -120px;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184,137,61,.14), transparent 70%);
      pointer-events: none;
    }
    .hero-orb-2 {
      position: absolute;
      bottom: -140px; left: -100px;
      width: 460px; height: 460px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(46,94,140,.10), transparent 70%);
      pointer-events: none;
    }
    .hero-content {
      position: relative;
      text-align: center;
      max-width: 840px;
    }
    .hero-eyebrow {
      text-transform: uppercase;
      letter-spacing: .22em;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 18px;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(52px, 11vw, 118px);
      line-height: .95;
      color: var(--text-strong);
      letter-spacing: -.01em;
    }
    .hero-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(20px, 3.2vw, 32px);
      color: var(--blue);
      margin-top: 10px;
      font-weight: 500;
    }
    .hero-tagline {
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.65;
      color: var(--text-body);
      max-width: 620px;
      margin: 26px auto 0;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-top: 38px;
      padding: 16px 38px;
      background: var(--gold);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: .02em;
      box-shadow: 0 14px 30px rgba(184,137,61,.32);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .hero-cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 38px rgba(184,137,61,.4);
    }
    .hero-scroll {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: gbmFloat 2.6s ease-in-out infinite;
    }
    .hero-scroll span:first-child {
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .hero-scroll-line {
      width: 1px;
      height: 34px;
      background: linear-gradient(#c9b07e, transparent);
    }

    /* ── Section shared ── */
    section { scroll-margin-top: 72px; }
    .section-eyebrow {
      text-transform: uppercase;
      letter-spacing: .2em;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 14px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(30px, 4.4vw, 46px);
      line-height: 1.08;
      color: var(--text-strong);
      margin-bottom: 16px;
    }
    .section-subtitle {
      font-size: clamp(15px, 1.6vw, 17px);
      line-height: 1.7;
      color: var(--text-body);
    }
    .section-header-centered {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 52px;
    }

    /* ── About ── */
    #about {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-cream);
    }
    .about-inner { max-width: 1160px; margin: 0 auto; }
    .about-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: clamp(36px, 5vw, 72px);
      align-items: center;
    }
    .about-text p {
      font-size: clamp(15px, 1.6vw, 17px);
      line-height: 1.78;
      color: var(--text-body);
      margin-bottom: 18px;
    }
    .about-blockquote {
      margin: 8px 0 0;
      padding: 18px 24px;
      border-left: 3px solid var(--gold);
      background: var(--quote-bg);
      border-radius: 0 12px 12px 0;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(17px, 2vw, 20px);
      color: var(--quote-ink);
      line-height: 1.5;
    }
    .about-photo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pastor-photo {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 4/5;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(27,42,74,.16);
      background: repeating-linear-gradient(45deg, var(--stripe-a), var(--stripe-a) 11px, var(--stripe-b) 11px, var(--stripe-b) 22px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pastor-photo span {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 12px;
      color: #9b8e6f;
      background: rgba(252,251,248,.85);
      padding: 7px 13px;
      border-radius: 8px;
      letter-spacing: .04em;
    }
    .pastor-photo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 28%;
      display: block;
    }
    .pastor-info { text-align: center; margin-top: 20px; }
    .pastor-name {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 23px;
      color: var(--text-strong);
    }
    .pastor-title {
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      margin-top: 7px;
    }
    .vm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
      margin-top: clamp(48px, 6vw, 80px);
    }
    .vm-card {
      border-radius: 20px;
      padding: clamp(28px, 3.5vw, 42px);
      border: 1px solid;
    }
    .vm-card.vision {
      background: var(--surface-blue);
      border-color: var(--surface-blue-bd);
    }
    .vm-card.mission {
      background: var(--surface-gold);
      border-color: var(--surface-gold-bd);
    }
    .vm-card-header {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 16px;
    }
    .vm-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 20px;
      flex-shrink: 0;
    }
    .vm-icon.vision-icon { background: var(--blue); }
    .vm-icon.mission-icon { background: var(--gold); }
    .vm-card h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 26px;
      color: var(--text-strong);
    }
    .vm-card p {
      font-size: clamp(16px, 1.8vw, 19px);
      line-height: 1.6;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    .vm-card.vision p { color: var(--vision-ink); }
    .vm-card.mission p { color: var(--mission-ink); }

    /* ── Services ── */
    #services {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-warm);
    }
    .services-inner { max-width: 1160px; margin: 0 auto; }
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 26px;
    }
    .event-card {
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(27,42,74,.08);
      border: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .event-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 22px 48px rgba(27,42,74,.13);
    }
    .event-photo {
      aspect-ratio: 16/10;
      background: repeating-linear-gradient(45deg, var(--stripe-a), var(--stripe-a) 11px, var(--stripe-b) 11px, var(--stripe-b) 22px);
      display: flex; align-items: center; justify-content: center;
    }
    .event-photo span {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 11.5px;
      color: #9b8e6f;
      background: rgba(255,255,255,.82);
      padding: 6px 12px;
      border-radius: 7px;
      letter-spacing: .04em;
    }
    .event-body {
      padding: 22px 24px 26px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .event-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 11px;
    }
    .event-date {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .event-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #cdbf9f;
    }
    .event-time {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
    }
    .event-card h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 22px;
      color: var(--text-strong);
      margin-bottom: 9px;
    }
    .event-card p {
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--text-body);
    }
    .see-all-wrap { text-align: center; margin-top: 48px; }
    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 15px 36px;
      background: transparent;
      color: var(--btn-solid-bg);
      text-decoration: none;
      border: 1.5px solid var(--btn-solid-bg);
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      transition: all .25s ease;
    }
    .btn-outline:hover { background: var(--btn-solid-bg); color: #fff; }

    /* ── Weekly Activities ── */
    #weekly {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-cream);
    }
    .weekly-inner { max-width: 1000px; margin: 0 auto; }
    .activities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }
    .activity-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 22px 24px;
      box-shadow: 0 10px 28px rgba(27,42,74,.06);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .activity-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(27,42,74,.11);
    }
    .activity-icon {
      width: 48px; height: 48px;
      flex-shrink: 0;
      border-radius: 14px;
      background: var(--surface-gold);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold);
      font-size: 22px;
    }
    .activity-name {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 19px;
      color: var(--text-strong);
      margin-bottom: 5px;
      line-height: 1.25;
    }
    .activity-day {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* ── Pray ── */
    #pray {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--pray-grad);
    }
    .pray-inner {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }
    .pray-inner .section-title { margin-bottom: 18px; }
    .pray-encourage {
      font-size: clamp(15px, 1.7vw, 18px);
      line-height: 1.7;
      color: var(--text-body);
      margin-bottom: 38px;
    }
    .pray-form, .contact-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: left;
    }
    .form-input, .form-textarea {
      width: 100%;
      padding: 15px 18px;
      border: 1px solid var(--border-input);
      border-radius: 13px;
      background: var(--surface);
      font-family: 'Mulish', sans-serif;
      font-size: 15px;
      color: var(--text-strong);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      resize: vertical;
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,137,61,.12);
    }
    .btn-primary {
      padding: 15px 32px;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Mulish', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(184,137,61,.28);
      transition: transform .25s ease;
      margin-top: 6px;
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .pray-success, .contact-success {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 42px 28px;
      box-shadow: 0 14px 34px rgba(27,42,74,.08);
      text-align: center;
      display: none;
    }
    .pray-success.visible, .contact-success.visible { display: block; }
    .success-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      font-size: 26px;
    }
    .success-icon.pray-icon { background: var(--surface-blue); color: var(--blue); }
    .success-icon.contact-icon { background: var(--surface-gold); color: var(--gold); }
    .success-msg {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 20px;
      color: var(--text-strong);
    }

    /* ── Locations ── */
    #location {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-cream);
    }
    .location-inner { max-width: 1160px; margin: 0 auto; }
    .branches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
    }
    .branch-card {
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 14px 38px rgba(27,42,74,.09);
      border: 1px solid var(--border-light);
    }
    .branch-card iframe {
      width: 100%;
      height: 240px;
      border: 0;
      display: block;
    }
    .branch-body { padding: 26px 28px 30px; }
    .branch-card h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 24px;
      color: var(--text-strong);
      margin-bottom: 14px;
    }
    .branch-detail {
      display: flex;
      gap: 10px;
      font-size: 15px;
      color: var(--text-body);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .branch-detail .icon { color: var(--gold); flex-shrink: 0; }
    .branch-directions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 12px 26px;
      background: var(--btn-solid-bg);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      transition: background .25s ease;
    }
    .branch-directions:hover { background: var(--gold); }

    /* ── Contact ── */
    #contact {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-warm);
    }
    .contact-inner { max-width: 1080px; margin: 0 auto; }
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: clamp(36px, 5vw, 64px);
      align-items: start;
    }
    .contact-info .section-title { margin-bottom: 18px; }
    .contact-info .section-subtitle { margin-bottom: 30px; }
    .contact-details { display: flex; flex-direction: column; gap: 18px; margin-bottom: 30px; }
    .contact-label {
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-faint);
      margin-bottom: 4px;
    }
    .contact-value {
      font-size: 17px;
      color: var(--text-strong);
      text-decoration: none;
      font-weight: 600;
    }
    .contact-value:hover { color: var(--gold); }
    .contact-value .sub {
      font-weight: 500;
      color: var(--text-sub);
      font-size: 14px;
    }
    .socials-label {
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-faint);
      margin-bottom: 12px;
    }
    .socials {
      display: flex;
      gap: 12px;
    }
    .social-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-strong);
      text-decoration: none;
      transition: all .25s ease;
    }
    .social-btn:hover {
      background: var(--btn-solid-bg);
      color: #fff;
      transform: translateY(-2px);
    }
    .contact-form-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: clamp(26px, 3.5vw, 38px);
      box-shadow: 0 14px 38px rgba(27,42,74,.08);
    }
    .contact-form .form-input,
    .contact-form .form-textarea {
      background: var(--surface-2);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .contact-form .btn-submit {
      padding: 15px 32px;
      background: var(--btn-solid-bg);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: 'Mulish', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: background .25s ease;
      width: 100%;
    }
    .contact-form .btn-submit:hover { background: var(--gold); }

    /* ── Footer ── */
    footer {
      background: var(--footer-bg);
      color: #aeb8cf;
      padding: 54px 24px 40px;
    }
    .footer-inner {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: center;
      justify-content: space-between;
    }
    .footer-brand { display: flex; align-items: center; gap: 12px; }
    .footer-logo {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--gold), var(--gold-dark));
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 19px;
    }
    .footer-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 18px;
      color: #fff;
    }
    .footer-tagline { font-size: 12px; margin-top: 2px; color: #8b97b3; }
    .footer-rights { font-size: 13px; color: #7c89a8; }

    /* ── WhatsApp Float ── */
    .wa-float {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 11px;
      background: var(--surface);
      border-radius: 999px;
      padding: 9px 18px 9px 9px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      border: 1px solid var(--border);
      transition: transform .25s ease;
    }
    .wa-float:hover { transform: translateY(-3px); }
    .wa-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #25D366;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      animation: gbmPulse 2.2s infinite;
    }
    .wa-label {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-strong);
      white-space: nowrap;
    }

    /* ── STTAI brief ── */
    #sttai {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-warm);
    }
    .sttai-inner { max-width: 1160px; margin: 0 auto; }
    .sttai-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: clamp(36px, 5vw, 64px);
      align-items: center;
    }
    .sttai-desc {
      font-size: clamp(15px, 1.6vw, 17px);
      line-height: 1.78;
      color: var(--text-body);
      margin: 16px 0 18px;
    }
    .sttai-badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-strong);
      background: var(--surface-gold);
      border: 1px solid var(--surface-gold-bd);
      padding: 9px 16px;
      border-radius: 999px;
      margin-bottom: 26px;
    }
    .sttai-placeholder {
      aspect-ratio: 4/3;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(27,42,74,.12);
      border: 1px solid var(--border-light);
      background:
        radial-gradient(circle at 30% 30%, rgba(184,137,61,.16), transparent 60%),
        repeating-linear-gradient(45deg, var(--stripe-a), var(--stripe-a) 11px, var(--stripe-b) 11px, var(--stripe-b) 22px);
      display: flex; align-items: center; justify-content: center;
    }
    .sttai-placeholder span {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 12px;
      color: var(--text-sub);
      background: var(--surface);
      padding: 7px 13px;
      border-radius: 8px;
      letter-spacing: .04em;
    }

    /* ── Church Family banner ── */
    #family {
      padding: clamp(70px, 9vw, 120px) 24px;
      background: var(--bg-cream);
    }
    .family-inner { max-width: 1100px; margin: 0 auto; }
    .family-photo {
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(27,42,74,.16);
      border: 1px solid var(--border-light);
    }
    .family-photo img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .nav-links { display: none; }
      nav .lang-switcher { display: none; }
      .nav-toggle { display: flex; }
      .nav-overlay { display: block; }
    }
    @media (max-width: 640px) {
      .about-grid { grid-template-columns: 1fr; }
      .contact-grid { grid-template-columns: 1fr; }
      /* Services & Events → horizontal swipe carousel on phone */
      .events-grid {
        display: flex;
        grid-template-columns: none;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        gap: 16px;
        padding-bottom: 8px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .events-grid::-webkit-scrollbar { display: none; }
      .event-card {
        flex: 0 0 82%;
        scroll-snap-align: start;
      }
    }
    @media (max-width: 480px) {
      .wa-label { display: none; }
      .wa-float { padding: 9px; }
    }
  </style>

    let currentLang = 'en';
    function get(obj, path){ return path.split('.').reduce((o,k)=> (o==null?undefined:o[k]), obj); }
    function applyLang(lang){
      const t = T[lang]; if(!t) return;
      document.querySelectorAll('[data-i18n]').forEach(el=>{ const v=get(t, el.getAttribute('data-i18n')); if(v!=null) el.textContent=v; });
      document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ const v=get(t, el.getAttribute('data-i18n-ph')); if(v!=null) el.placeholder=v; });
      document.documentElement.lang = lang;
    }
    // Language switcher
    document.querySelectorAll('.lang-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const lang=btn.getAttribute('data-lang'); if(lang===currentLang) return;
        currentLang=lang;
        try{ localStorage.setItem('gbm-lang', lang); }catch(e){}
        document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.lang-btn[data-lang="'+lang+'"]').forEach(b=>b.classList.add('active'));
        applyLang(lang); closeDrawer();
      });
    });
    // Theme toggle
    const themeToggle=document.querySelector('.theme-toggle');
    if(themeToggle){ themeToggle.addEventListener('click', ()=>{ const isDark=document.documentElement.getAttribute('data-theme')==='dark'; const next=isDark?'light':'dark'; document.documentElement.setAttribute('data-theme', next); try{ localStorage.setItem('gbm-theme', next); }catch(e){} }); }
    // Mobile drawer
    const navToggle=document.querySelector('.nav-toggle');
    const drawer=document.getElementById('mobile-drawer');
    const overlay=document.querySelector('.nav-overlay');
    function openDrawer(){ document.body.classList.add('nav-open'); navToggle.setAttribute('aria-expanded','true'); drawer.setAttribute('aria-hidden','false'); }
    function closeDrawer(){ document.body.classList.remove('nav-open'); navToggle.setAttribute('aria-expanded','false'); drawer.setAttribute('aria-hidden','true'); }
    navToggle.addEventListener('click', ()=>{ document.body.classList.contains('nav-open')?closeDrawer():openDrawer(); });
    overlay.addEventListener('click', closeDrawer);
    document.querySelector('.drawer-close').addEventListener('click', closeDrawer);
    document.querySelectorAll('.drawer-links a').forEach(a=>a.addEventListener('click', closeDrawer));
    document.addEventListener('keydown', e=>{ if(e.key==='Escape'&&document.body.classList.contains('nav-open')) closeDrawer(); });
    // Scroll reveal
    let revealObserver=null;
    function observeRevealElements(){
      const els=document.querySelectorAll('[data-reveal]:not(.revealed)');
      if('IntersectionObserver' in window){
        if(!revealObserver){ revealObserver=new IntersectionObserver((entries)=>{ entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('revealed'); revealObserver.unobserve(en.target); } }); }, { threshold:0.08, rootMargin:'0px 0px -40px 0px' }); }
        els.forEach(el=>revealObserver.observe(el));
      } else { els.forEach(el=>el.classList.add('revealed')); }
    }
    // Init
    (function initLang(){ let saved='en'; try{ const s=localStorage.getItem('gbm-lang'); if(s&&T[s]) saved=s; }catch(e){} currentLang=saved; document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.lang-btn[data-lang="'+saved+'"]').forEach(b=>b.classList.add('active')); applyLang(saved); })();
    observeRevealElements();
  </script>
